    const bId=b._id||(b._id=++_dotIdCounter);
    if(now - (a._lastPairGrow[bId]||0) < 1000) return;
    if(now - (b._lastPairGrow[aId]||0) < 1000) return;
    a._lastPairGrow[bId]=now;
    b._lastPairGrow[aId]=now;
    tryGrow(a, 15/(a.size*a.size));
    tryGrow(b, 15/(b.size*b.size));
    return;
  }
  if(Math.abs(a.size-b.size)<0.25) return; // inert when same size
  const lg=a.size>b.size?a:b, sm=lg===a?b:a;
  if(sm.type==='revolutionary'||sm.type==='emperor'||sm.faction==='emperor') return;
  const lgRB=lg.color==='red'||lg.color==='blue';
  const smRB=sm.color==='red'||sm.color==='blue';
  // Red vs blue: smaller shrinks (scaled), turns white
  if(lgRB&&smRB){
    if(sm.faction==='politician'){sm.color=lg.color;return;}
    if(sm.type==='tyrant'||sm.type==='church'||sm.faction==='church') return;
    // 0.75s per-dot cooldown for rbw-class conversion
    const _now = performance.now();
    if((sm._lastRbwConv||0) > _now - 750) return;
    sm._lastRbwConv = _now;
    sm.color='white'; sm.faction=null; sm.type='normal';
    sm.size=Math.max(MIN_SZ,sm.size-5/sm.size);
    return;
  }
  // White vs red/blue: white converts to colour if smaller (no shrinkage)
  if(lgRB && sm.color==='white'){
    if(sm.type==='tyrant'||sm.type==='church'||sm.faction==='church') return;
    const _now = performance.now();
    if((sm._lastRbwConv||0) > _now - 750) return;
    sm._lastRbwConv = _now;
    sm.color=lg.color; sm.faction=null; sm.type='normal';
    return;
  }
  // Bigger white neutralises smaller red/blue/politician-follower: turns white, shrinks
  if(lg.color==='white' && smRB){
    if(sm.type==='tyrant'||sm.type==='church'||sm.faction==='church') return;
    if(sm.type==='politician') return; // politician leader immune
    const _now = performance.now();
    if((sm._lastRbwConv||0) > _now - 750) return;
    sm._lastRbwConv = _now;
    sm.color='white'; sm.faction=null; sm.type='normal';
    sm.size=Math.max(MIN_SZ,sm.size-5/sm.size);
    return;
  }
}

// ── Win ──────────────────────────────────────────────────────
function checkWin(){
  const total=dots.length; if(!total) return;
  const rc=dots.filter(d=>d.color==='red').length;
  const bc=dots.filter(d=>d.color==='blue').length;
  document.getElementById('rcount').textContent=rc;
  document.getElementById('bcount').textContent=bc;
  // Win conditions and dominance are paused during chaos
  if(globalChaos) return;
  if(total>=5){
    if(dots.every(d=>d.faction==='church'||d.type==='church')){endGame('Theocracy. Great.','#7A9468',`${total} faithful`);return;}

      // Elite win: elite ring mass ≥ 60 AND no outsider is size ≥ 8 AND no rival emperor/crowned leader exists
      if(elites.length > 0){
        let eliteMass = 0;
        let bigOutsider = false;
        let rivalLeader = false;
        for(const d of dots){
          if(d.dead) continue;
          if(d._elite && isEliteInRing(d)){ eliteMass += d.size; continue; }
          if(isEliteInRing(d)) continue;
          if(d.type==='emperor' || (d.type==='tyrant' && d.crowned) || (d.type==='revolutionary' && d.crowned)){
            rivalLeader = true; break;
          }
          if(d.type==='church') continue;
          if(d.size >= 8){ bigOutsider = true; break; }
        }
        if(eliteMass >= 60 && !bigOutsider && !rivalLeader){
          endGame('Elites took over','#28231E',`Total ${total}`);
          return;
        }
      }

    // Screen dominance win: any colour covering >=99% of canvas area triggers the washout ending
    const screenArea=CW*CH;
    const areaByColor={};
    let politicianArea=0;
    for(const d of dots){
      const a=Math.PI*d.size*d.size;
      areaByColor[d.color]=(areaByColor[d.color]||0)+a;
      if(d.type==='politician' || d.faction==='politician') politicianArea+=a;
    }
    let domColor=null;
    for(const c in areaByColor){ if(areaByColor[c]/screenArea>=0.99){ domColor=c; break; } }
    // Politician total dominance (across all their colours)
    if(!domColor && politicianArea/screenArea>=0.99){
      // Find the dominant politician colour for the ending visual
      let bestC=null, bestA=0;
      for(const d of dots){
        if(d.type==='politician'||d.faction==='politician'){
          if((areaByColor[d.color]||0)>bestA){ bestA=areaByColor[d.color]; bestC=d.color; }
        }
      }
      endGame('Another party took over', bestC||'#D4B85C', `Total ${total}`); return;
    }
    if(domColor){
      if(domColor==='red'){endGame('Red wins','#B8695E',`Red ${rc}  ·  Blue ${bc}`);return;}
      if(domColor==='blue'){endGame('Blue wins','#607EA0',`Red ${rc}  ·  Blue ${bc}`);return;}
      if(domColor==='white') return; // neutrals can't win
      if(domColor==='#28231E'){endGame('Clueless worship of elites','#28231E',`Total ${total}`);return;}
      if(domColor==='#ffb3de'){endGame('"Totally real this time"','#ffb3de',`Total ${total}`);return;}
      if(domColor==='#7A9468'){endGame('Theocracy. Great.','#7A9468',`${total} faithful`);return;}
      const hasTyrant=dots.some(d=>d.type==='tyrant'&&d.color===domColor);
      const hasEmperor=dots.some(d=>d.type==='emperor'&&d.color===domColor);
      const hasPolLeader=dots.some(d=>d.type==='politician'&&d.color===domColor);
      const hasRevLeader=dots.some(d=>d.type==='revolutionary'&&d.color===domColor);
      if(hasTyrant||hasEmperor){endGame('The Emperor reigns supreme',domColor,`Total ${total}`);return;}
      if(hasPolLeader){endGame('Another party took over',domColor,`Total ${total}`);return;}
      if(hasRevLeader){endGame('Revolution swept the land',domColor,`Total ${total}`);return;}
      // Fallback: leaderless colour win — name the colour
      if(domColor==='red'){endGame('Red wins','#B8695E',`Red ${rc}  ·  Blue ${bc}`);return;}
      if(domColor==='blue'){endGame('Blue wins','#607EA0',`Red ${rc}  ·  Blue ${bc}`);return;}
      endGame('A colour took over',domColor,`Total ${total}`);return;
    }

    // Alarmism washout: ≥99% of dots are infected
    const infectedCount = dots.filter(d => d._infected).length;
    if(infectedCount/total >= 0.99){
      endGame('"Totally real this time"','#ffb3de',`Total ${total}`);
      return;
    }

    const first=dots[0].color;
    if(dots.every(d=>d.color===first)){
      if(first==='red'){endGame('Red wins','#B8695E',`Red ${rc}  ·  Blue ${bc}`);return;}
      if(first==='blue'){endGame('Blue wins','#607EA0',`Red ${rc}  ·  Blue ${bc}`);return;}
      if(first==='white') return; // neutrals can't win
      if(first==='#28231E'){endGame('Clueless worship of elites','#28231E',`Total ${total}`);return;}
      if(first==='#ffb3de'){endGame('"Totally real this time"','#ffb3de',`Total ${total}`);return;}
      if(first==='#7A9468'){endGame('Theocracy. Great.','#7A9468',`${total} faithful`);return;}
      const hasTyrant=dots.some(d=>d.type==='tyrant');
      const hasEmperor=dots.some(d=>d.type==='emperor');
      const hasPolLeader=dots.some(d=>d.type==='politician');
      const hasRevLeader=dots.some(d=>d.type==='revolutionary');
      if(hasTyrant||hasEmperor){endGame('The Emperor reigns supreme',first,`Total ${total}`);return;}
      if(hasPolLeader){endGame('Another party took over',first,`Total ${total}`);return;}
      if(hasRevLeader){endGame('Revolution swept the land',first,`Total ${total}`);return;}
      const f=dots[0].faction;
      if(f==='emperor'){endGame('The Emperor reigns supreme',first,`Total ${total}`);return;}
      if(f==='revolutionary'){endGame('Revolution swept the land',first,`Total ${total}`);return;}
      if(f==='politician'){endGame('Another party took over',first,`Total ${total}`);return;}
    }
  }
  const statusEl=document.getElementById('status');
  if(statusEl){
    const leader=rc>bc?'red':bc>rc?'blue':null;
    if(leader){statusEl.textContent=`${leader} ${Math.round((leader==='red'?rc:bc)/total*100)}%`;statusEl.style.color=leader==='red'?'var(--red)':'var(--blue)';}
    else{statusEl.textContent='';statusEl.style.color='var(--dim)';}
  }
}

let pendingWin = null; // {title, color, stats, frames}
let eliteStableFrames = 0; // frames the elite-win conditions have held continuously

let _endGameCalledThisFrame = false;
function endGame(title,color,stats){
  _endGameCalledThisFrame = true;
  // Defer the actual end by 120 frames so the player sees the cause
  if(pendingWin && pendingWin.title === title && pendingWin.color === color){
    return; // already pending the same outcome — let it tick
  }
  pendingWin = { title, color, stats, frames: 0 };
}

function commitEndGame(title,color,stats){
  running=false;
  pendingWin = null;
  // Secret achievement: won via elite black washout, using ALL of Elite/Disaster/Brainwash/Division and ONLY those
  const required = ['elite','disaster','brain','div'];
  const usedAllRequired = required.every(b => buttonsUsed.has(b));
  const usedOnlyRequired = [...buttonsUsed].every(b => required.includes(b));
  if(usedAllRequired && usedOnlyRequired && color === '#28231E'){
    title = 'You understood this game';
  }
  const wt=document.getElementById('win-title');
  wt.textContent=title; wt.style.color=color;
  document.getElementById('win-stats').textContent=stats;
  document.getElementById('win-overlay').style.display='flex';
  // Auto-restart after 30 seconds so the game can run indefinitely as a screensaver
  if(winAutoRestartTimer) clearTimeout(winAutoRestartTimer);
  winAutoRestartTimer = setTimeout(()=>{
    if(!running){ // only restart if user hasn't manually restarted
      startGame();
    }
  }, 15000);
}
let winAutoRestartTimer = null;

// ── Loop ─────────────────────────────────────────────────────
function loop(t){
  requestAnimationFrame(loop); if(!running) return;
  if(paused){
    // Render only — no physics, no births
    ctx.fillStyle='#ECE7DF';ctx.fillRect(0,0,CW,CH);
    for(const d of dots) d.draw(t);
    // brainwash UI still rendered
    for(const bw of brainwashers){
      const {fill}=getDisplay(bw.color);
      const grad=ctx.createRadialGradient(bw.x,bw.y,4,bw.x+bw.nx*60,bw.y+bw.ny*60,180);
      grad.addColorStop(0, fill+'55'); grad.addColorStop(1, fill+'00');
      ctx.save(); ctx.beginPath(); ctx.moveTo(bw.x,bw.y);
      const spread=Math.acos(0.6), baseAng=Math.atan2(bw.ny,bw.nx);
      ctx.arc(bw.x,bw.y,180,baseAng-spread,baseAng+spread);
      ctx.closePath(); ctx.fillStyle=grad; ctx.fill(); ctx.restore();
      ctx.strokeStyle=darkenHex(fill.startsWith('#')?fill:'#28231E',0.18);
      ctx.lineWidth=2; ctx.lineCap='round';
      const px=-bw.ny, py=bw.nx, armLen=14;
      ctx.beginPath();
      ctx.moveTo(bw.x+px*armLen, bw.y+py*armLen); ctx.lineTo(bw.x+bw.nx*armLen, bw.y+bw.ny*armLen);
      ctx.moveTo(bw.x-px*armLen, bw.y-py*armLen); ctx.lineTo(bw.x+bw.nx*armLen, bw.y+bw.ny*armLen);
      ctx.stroke(); ctx.lineCap='butt';
    }
    return;
  }
  if(birthRate>0){
    birthFrames+=actionRate;
    const livePopCount = dots.filter(d => !d.dead && d.type==='normal' && !d._inChurch && !d._warOff).length;
    const perCapita = birthRate * (livePopCount / 60);
    const effBirthRate = globalChaos ? perCapita * 6 : globalDemoralize ? perCapita * 0.5 : globalDepression ? perCapita * 0.5 : perCapita;
    const interval=3600/effBirthRate;
    if(birthFrames>=interval){
      birthFrames=0;
      let color = 'white';
      let bornAlarmist = false;
      // Newborns take the mass-dominant colour. Pink dominance = alarmist newborns.
      if(domColorCache && domColorCache !== 'white'){
        color = domColorCache;
        if(domColorCache === '#ffb3de'){
          bornAlarmist = true;
        }
      }
      let sx = CW*.1+Math.random()*CW*.8;
      let sy = CH*.1+Math.random()*CH*.8;
      // Reject spawn locations inside any elite ring (re-roll up to 20 times)
      for(let tries=0; tries<20; tries++){
        let inRing = false;
        for(const ring of elites){
          const dx = sx-ring.x, dy = sy-ring.y;
          if(dx*dx+dy*dy < (ring.r+10)*(ring.r+10)){ inRing = true; break; }
        }
        if(!inRing) break;
        sx = CW*.1+Math.random()*CW*.8;
        sy = CH*.1+Math.random()*CH*.8;
      }
      const newDot = new Dot(sx, sy, color);
      if(globalDepression){
        newDot._depShrink = 0.005 + Math.random() * 0.040;
      }
      if(bornAlarmist){
        newDot._infected = true;
        newDot._panicked = true;
        newDot._infectedFrames = 0;
        // Give them speed
        const va = Math.random()*Math.PI*2;
        newDot.vx = Math.cos(va) * 4;
        newDot.vy = Math.sin(va) * 4;
      }
      // Apply spawn-size reductions from elite ring and/or brainwash — use the smaller
      let effSpawn = newDot.size;
      if(elites.length > 0) effSpawn = Math.min(effSpawn, spawnSize);
      if(globalBrainwash) effSpawn = Math.min(effSpawn, bwSpawnSize);
      newDot.size = effSpawn;
      dots.push(newDot);
    }
  }
  totalRevMass=0;emperorMassByColor={};emperorFollowerCount={};revFollowerCount={};polLeaderByColor={};empLeaderByColor={};tyrantByColor={};churchMassByColor={};
  for(const d of dots){
    if(d.type==='tyrant'){tyrantByColor[d.color]=true;empLeaderByColor[d.color]=true;emperorMassByColor[d.color]=(emperorMassByColor[d.color]||0)+d.size*d.size;}
    if(d.faction==='emperor'){emperorMassByColor[d.color]=(emperorMassByColor[d.color]||0)+d.size*d.size;if(d.type==='normal')emperorFollowerCount[d.color]=(emperorFollowerCount[d.color]||0)+1;if(d.type==='emperor')empLeaderByColor[d.color]=true;}
    else if(d.faction==='revolutionary'){totalRevMass+=d.size*d.size;if(d.type==='normal')revFollowerCount[d.color]=(revFollowerCount[d.color]||0)+1;}
    else if(d.faction==='politician'){if(d.type==='politician')polLeaderByColor[d.color]=true;}
    if(d.type==='church'||d.faction==='church'){churchMassByColor[d.color]=(churchMassByColor[d.color]||0)+d.size*d.size;}
  }
  const colorMass={};
  let eliteMassTotal = 0;
  for(const d of dots){
    if(d._atWar) continue; // soldiers are inert, not counted toward dominance
    colorMass[d.color]=(colorMass[d.color]||0)+d.size*d.size;
    if(d._elite) eliteMassTotal += d.size*d.size;
  }
  // Update brainwash allegiance to top-mass colour (skipped during chaos)
  if(!globalChaos){
    let best=null, bestM=-1, totalM=0;
    for(const c in colorMass){ totalM += colorMass[c]; if(colorMass[c]>bestM){ bestM=colorMass[c]; best=c; } }
    if(best) domColorCache=best;
    domPctCache = (best && totalM>0) ? bestM/totalM : 0;
    for(const bw of brainwashers) bw.color=domColorCache;
    // Thugs and mouthpieces always wear the dominant colour
    if(best){
      for(const d of dots){
        if(d.dead) continue;
        if((d.type==='thug' || d.type==='media') && d.color !== best){
          d.color = best;
        }
      }
    }
    // Update dominance bar
    if(best && totalM>0){
      const pct = (bestM/totalM)*100;
      const fillEl = document.getElementById('dom-fill');
      if(fillEl){
        const disp = getDisplay(best);
        fillEl.style.width = pct.toFixed(1)+'%';
        fillEl.style.backgroundColor = disp.fill;
      }
      const pctEl = document.getElementById('dom-pct');
      if(pctEl){
        const disp = getDisplay(best);
        pctEl.textContent = Math.round(pct) + '%';
        pctEl.style.color = disp.fill;
      }
    }
  }
  for(const d of dots){
    if(d.type==='tyrant'||d.type==='revolutionary'||d.type==='emperor'){
      const myMass=colorMass[d.color]||0;
      let maxOther=0;
      for(const c in colorMass) if(c!==d.color&&colorMass[c]>maxOther) maxOther=colorMass[c];
      const qualifies=myMass>=maxOther;
      // Grace period after crowning: cannot be dethroned for 180 frames (3 seconds)
      if(d._crownedAt !== undefined){
        d._crownedAt++;
      }
      const inGrace = d.crowned && d._crownedAt !== undefined && d._crownedAt < 180;
      if(!qualifies && !inGrace){
        if(d.crowned){
          // Was crowned, now losing crown — stop movement
          d.vx = 0; d.vy = 0;
        }
        if(d.type==='emperor' && d.crowned){
          cascadeNeutralize(d);
          // Revert recoloured dots
          const liveEmp = dots.find(o => !o.dead && o!==d && o.type==='emperor');
          for(const o of dots){
            if(o._preEmpColor===undefined) continue;
            if(liveEmp){ o.color = liveEmp.color; }
            else {
              o.color = o._preEmpColor;
              if(o._preEmpFaction){ o.faction = o._preEmpFaction; o._preEmpFaction = undefined; }
              o._preEmpColor = undefined;
            }
          }
          d.type='normal'; d.faction=null;
          d._exEmperor = true;
        }
        d.crowned=false; d._crownFrames=0; d._crownedAt = undefined;
      }
      else if(qualifies){
        d._crownFrames=(d._crownFrames||0)+1;
        if(d._crownFrames>=3 && !d.crowned){
          d.crowned=true;
          d._crownedAt = 0;
          // Tyrant ascends to emperor on crown (existing rule in update())
          // Crowned rev also ascends to emperor here
          if(d.type==='revolutionary'){
            d.ascendToEmperor();
          }
        }
      }
    }
  }
  // Propagate rev-leader crowned state to all same-colour rev followers
  {
    const revCrowned={};
    for(const d of dots) if(d.type==='revolutionary' && d.crowned) revCrowned[d.color]=true;
    for(const d of dots){
      if(d.faction==='revolutionary' && d.type==='normal') d.crowned = !!revCrowned[d.color];
    }
  }
  // Propagate church-leader crowned state to all same-colour church followers
  {
    const churchCrowned={};
    for(const d of dots) if(d.type==='church' && d.crowned) churchCrowned[d.color]=true;
    for(const d of dots){
      if(d.faction==='church' && d.type==='normal') d.crowned = !!churchCrowned[d.color];
    }
  }
  // Church size derived from follower count; dies if no followers
  {
    const MIN_CHURCH = 8;
    const followersByColor = {};
    for(const d of dots){
      if(d.dead) continue;
      if(d._inChurch) continue; // absorbed dots don't count toward size
      if(d.type !== 'normal') continue;
      // Regular church followers, or empire-converted church followers
      if(d.faction === 'church' || d._preEmpFaction === 'church'){
        followersByColor[d.color] = (followersByColor[d.color]||0) + 1;
      }
    }
    for(const d of dots){
      if(d.dead||d.type!=='church') continue;
      const fc = followersByColor[d.color] || 0;
      if(fc === 0){
        d.dead = true;
        continue;
      }
      d.size = Math.max(MIN_SZ, d.size); // never goes negative
      const target = Math.max(MIN_CHURCH, Math.min(30, fc * 6));
      d.size = d.size + (target - d.size) * 0.15;
    }
    // Sync button active state with whether any churches exist
    const anyChurch = dots.some(d => !d.dead && d.type === 'church');
    const btn = document.getElementById('church-btn');
    if(btn) btn.classList.toggle('active', anyChurch);
  }
  // Politician follower loyalty: sync follower colour to leader, clear loyalty if leader dead
  {
    const polLeaders = new Map();
    for(const d of dots) if(!d.dead && d.type==='politician' && d._polId) polLeaders.set(d._polId, d);
    for(const d of dots){
      if(d.dead||!d._polId) continue;
      if(d===polLeaders.get(d._polId)) continue;
      const leader = polLeaders.get(d._polId);
      if(leader){
        // Sync colour to leader
        d.color = leader.color;
      } else {
        // Leader is dead — followers go neutral (they followed the man, not the idea)
        d._polId = null;
        d.color = 'white';
        d.faction = null;
        d.type = 'normal';
        d.crowned = false;
      }
    }
  }
  ctx.fillStyle='#ECE7DF';ctx.fillRect(0,0,CW,CH);

  for(const d of dots) d.update();

  // Count same-colour overlapping neighbours for crowd dampening
  for(const d of dots) d._sameColorNeighbours=0;
  for(let i=0;i<dots.length;i++){
    const a=dots[i]; if(a.dead) continue;
    for(let j=i+1;j<dots.length;j++){
      const b=dots[j]; if(b.dead||a.color!==b.color) continue;
      const dx=b.x-a.x, dy=b.y-a.y;
      const md=a.size+b.size+8; // generous buffer to catch dots that just bounced apart
      if(dx*dx+dy*dy < md*md){
        a._sameColorNeighbours++;
        b._sameColorNeighbours++;
      }
    }
  }

  collide();
  for(const d of dots){
    if(d.dead) continue;
    if(d._elite) continue; // elites pass through divider walls
    if(d._atWar) continue; // soldiers pass through divider walls
    if(d.type==='tyrant') continue; // tyrants pass through divider walls
    if(d.type==='revolutionary') continue; // revolutionary leaders pass through divider walls
    if(d._demoralized) continue; // demoralised dots ignore divider walls
    for(const w of walls){
      const wx=w.x2-w.x1,wy=w.y2-w.y1,len2=wx*wx+wy*wy;
      if(len2<1) continue;
      let s=((d.x-w.x1)*wx+(d.y-w.y1)*wy)/len2;
      s=Math.max(0,Math.min(1,s));
      const cx=w.x1+s*wx,cy=w.y1+s*wy,ddx=d.x-cx,ddy=d.y-cy,dist=Math.hypot(ddx,ddy);
      if(dist<d.size&&dist>0.0001){
        const nx=ddx/dist,ny=ddy/dist;
        d.x=cx+nx*d.size;d.y=cy+ny*d.size;
        const vn=d.vx*nx+d.vy*ny;
        if(vn<0){d.vx-=2*vn*nx;d.vy-=2*vn*ny;}
      }
    }
  }
  // ── Global brainwash: when active, everything shrinks, slows, and tints toward dominant colour
  if(globalBrainwash){
    if(bwSpawnSize > MIN_SZ) bwSpawnSize = Math.max(MIN_SZ, bwSpawnSize - 0.01);
    const exempt = d => d.type==='church' || d.type==='tyrant' || d.type==='emperor' || d.type==='revolutionary' || d._elite;
    for(const d of dots){
      if(d.dead) continue;
      if(exempt(d)) continue;
      if(d.size>MIN_SZ) d.size = Math.max(MIN_SZ, d.size - 0.01);
      d.vx *= 0.985;
      d.vy *= 0.985;
    }
    // Every 2 seconds (120 frames), convert 20% of mismatched dots
    globalBrainwashFrames = (globalBrainwashFrames||0) + 1;
    if(globalBrainwashFrames >= 120){
      globalBrainwashFrames = 0;
      // Determine target: usually dominant colour, but if an elite ring exists and the only
      // non-elite colours are whites and/or pinks (alarmists), target is elite black instead.
      let target = domColorCache;
      if(elites.length > 0){
        let allWhiteOrPink = true;
        for(const d of dots){
          if(d.dead) continue;
          if(d._elite) continue;
          if(d.color === 'white' || d.color === '#ffb3de') continue;
          allWhiteOrPink = false; break;
        }
        if(allWhiteOrPink) target = '#28231E';
      }
      // No conversion if target is white — there's no ideology to convert toward
      if(target === 'white'){
        // Slow/shrink still happens above; no conversion this tick
      } else {
      const mismatched = dots.filter(d =>
        !d.dead &&
        d.color !== target &&
        !exempt(d)
      );
      const livingCount = dots.filter(d => !d.dead).length;
      const toConvert = Math.min(mismatched.length, Math.ceil(livingCount * 0.05));
      // Sort by size ascending — smaller dots get brainwashed first (easier targets)
      mismatched.sort((a,b) => a.size - b.size);
      for(let i=0;i<toConvert;i++){
        // Weighted random within first half of sorted list (favours smaller)
        const pickRange = Math.max(1, Math.ceil(mismatched.length * 0.6));
        const idx = Math.floor(Math.random()*pickRange);
        const d = mismatched[idx];
        if(!d) continue;
        d.color = target;
        d.faction = null;
        d.type = 'normal';
        d._infected = false;
        d._panicked = false;
        d._cureTouches = null;
        // Brainwash frees from demoralisation
        if(d._demoralized){
          d._demoralized = false;
          d._flashColor = null;
          d._flashUntil = 0;
          d._ringR = undefined;
        }
        mismatched.splice(idx, 1);
      }
      }
    }
  } else {
    globalBrainwashFrames = 0;
    if(bwSpawnSize < 10) bwSpawnSize = Math.min(10, bwSpawnSize + 0.01);
  }

  // ── Global demoralise: eligible dots orbit a ring around centre, flashing colours cosmetically
  // ── Global depression: every dot shrinks at its assigned rate; dies when size hits 0
  if(globalDepression){
    for(const d of dots){
      if(d.dead || d._inChurch || d._warOff) continue;
      const rate = d._depShrink || 0;
      if(rate > 0){
        d.size -= rate;
        if(d.size <= 0){ d.dead = true; }
      }
    }
  }

  if(globalDemoralize){
    const cx = CW/2, cy = CH/2;
    const ringMid = Math.min(CW, CH) * 0.38; // donut centreline radius
    const _now = performance.now();
    const exempt = d => d.type==='church' || d.type==='tyrant' || d.type==='emperor' || d.type==='revolutionary'
      || d.type==='politician' || d.type==='thug' || d.type==='media'
      || d.faction==='church' || d.faction==='revolutionary' || d.faction==='emperor'
      || d._mediaConverted
      || d._elite || d._atWar || d._warOff || d._inChurch || d.dead;
    for(const d of dots){
      if(exempt(d)) continue;
      d._demoralized = true;
      // Compute angle from centre to dot
      const ddx = d.x - cx, ddy = d.y - cy;
      const ang = Math.atan2(ddy, ddx);
      // Target radius: ring centreline (could vary per dot for thickness)
      if(d._ringR === undefined){
        d._ringR = ringMid + (Math.random()-0.5) * 80; // thickness of donut, ~±40
      }
      const tx = cx + Math.cos(ang) * d._ringR;
      const ty = cy + Math.sin(ang) * d._ringR;
      // Ease position toward ring (slow drift in — 3x slower than original)
      d.x += (tx - d.x) * 0.0067;
      d.y += (ty - d.y) * 0.0067;
      // Tangential velocity: perpendicular to radial direction, counter-clockwise
      const tanX = -Math.sin(ang);
      const tanY = Math.cos(ang);
      const targetSp = 0.8;
      const targetVx = tanX * targetSp;
      const targetVy = tanY * targetSp;
      d.vx += (targetVx - d.vx) * 0.017;
      d.vy += (targetVy - d.vy) * 0.017;
      // Flashing: pick a new random colour every ~500ms (90% white, 5% red, 5% blue)
      if(!d._flashUntil || _now > d._flashUntil){
        const r = Math.random();
        d._flashColor = r < 0.05 ? 'red' : r < 0.10 ? 'blue' : 'white';
        d._flashUntil = _now + 400 + Math.random()*300;
      }
    }
  } else {
    // Clear per-dot ring assignment when toggle is off (will reassign on next on)
    if(dots.some(d=>d._ringR !== undefined)){
      for(const d of dots){
        d._ringR = undefined;
      }
    }
  }

  // ── Global chaos: 5x velocity, dots flash random faction colours (commit on toggle off)
  if(globalChaos){
    const _now2 = performance.now();
    // Pool: white, red, blue, pink, plus populist golds (each at red/blue weight). No regime/church/rev colours.
    const chaosPool = ['white','white','white','white','white','white','white','white','white','white','white','white',
                       'red','red',
                       'blue','blue',
                       '#ffb3de','#ffb3de',
                       '#C4A24E','#C4A24E',
                       '#B58656','#B58656',
                       '#A89060','#A89060'];
    for(const d of dots){
      if(d.dead) continue;
      if(d._inChurch) continue;
      // Leaders exempt
      if(d.type==='church' || d.type==='tyrant' || d.type==='emperor' || d.type==='revolutionary' || d.type==='politician') continue;
      if(d._elite) continue;
      if(d._atWar || d._warOff) continue;
      const targetSp = 5;
      const sp = Math.hypot(d.vx, d.vy) || 0.0001;
      if(sp < targetSp){
        const k = targetSp / sp;
        d.vx *= k;
        d.vy *= k;
      }
      // Mild shrink during chaos
      if(d.size > MIN_SZ) d.size = Math.max(MIN_SZ, d.size - 0.0025);
      if(!d._chaosFlashUntil || _now2 > d._chaosFlashUntil){
        d._chaosFlashColor = chaosPool[Math.floor(Math.random()*chaosPool.length)];
        d._chaosFlashUntil = _now2 + 80 + Math.random()*120;
      }
    }
  } else {
    // Chaos turned off: COMMIT each dot's flash colour to its real colour and faction
    for(const d of dots){
      if(d._chaosFlashColor === undefined) continue;
      const newColor = d._chaosFlashColor;
      d.color = newColor;
      if(newColor === '#C4A24E'){
        d.faction = 'politician';
        d.type = 'normal';
        d._polId = null;
      } else if(newColor === '#5A9FA4'){
        d.faction = 'revolutionary';
        d.type = 'normal';
      } else if(newColor === '#7A9468'){
        d.faction = 'church';
        d.type = 'normal';
      } else if(newColor === '#ffb3de'){
        d.faction = null;
        d.type = 'normal';
        d._infected = true;
        d._panicked = true;
        d._infectedFrames = 0;
        const sp = Math.hypot(d.vx,d.vy) || 0.1;
        d.vx = d.vx/sp * 4;
        d.vy = d.vy/sp * 4;
      } else {
        d.faction = null;
        d.type = 'normal';
      }
      d._chaosFlashColor = undefined;
      d._chaosFlashUntil = 0;
      d._postChaosUntil = performance.now() + 2500; // 2.5s inert deceleration period
      if(d._demoralized){
        d._demoralized = false;
        d._flashColor = null;
        d._flashUntil = 0;
        d._ringR = undefined;
      }
    }
  }

  // ── War: drafts dots aged 15-50s, sends them off-screen; 25% return after 2-5s shrunk
  if(globalWar && draftDir){
    warFrames++;
    if(warFrames >= 60){
      warFrames = 0;
      const [wdx, wdy] = draftDir;
      const draftable = dots.filter(d => !d.dead && !d._atWar && !d._warOff && !d._returning &&
        !d._exEmperor &&
        (!d._veteranUntil || performance.now() >= d._veteranUntil) &&
        d.type==='normal' && !d._elite &&
        d.age >= 15*60 && d.age <= 55*60);
      // Determine soldier uniform colour at draft. Default drab grey.
      // If a regime colour (rev, emperor, or elite-black) is mass-dominant, use that instead.
      let soldierColor = '#5C5048';
      const dom = domColorCache;
      if(dom === '#28231E' && elites.length > 0){
        soldierColor = '#28231E';
      } else if(dom && dom !== 'white' && dom !== 'red' && dom !== 'blue' && dom !== '#ffb3de' && dom !== '#7A9468'){
        const revAlive = dots.some(d => !d.dead && d.type==='revolutionary' && d.color === dom);
        const emperorAlive = dots.some(d => !d.dead && d.type==='emperor' && d.color === dom);
        if(revAlive || emperorAlive){
          soldierColor = dom;
        }
      }
      for(const d of draftable){
        // If demoralised, snapshot the flash colour as real colour before draft (so it sticks if they return)
        if(d._demoralized){
          if(d._flashColor) d.color = d._flashColor;
          d._demoralized = false;
          d._flashColor = null;
          d._flashUntil = 0;
          d._ringR = undefined;
        }
        d._atWar = true;
        d._warDir = [wdx, wdy];
        d.color = soldierColor;
        d.faction = null;
        d._polId = null;
        d.crowned = false;
        d.vx = wdx * 4;
        d.vy = wdy * 4;
      }
    }
  }
  // Process at-war dots regardless of toggle
  for(const d of dots){
    if(d.dead) continue;
    if(d._atWar && !d._warOff){
      let vx = d._warDir[0] * 4;
      let vy = d._warDir[1] * 4;
      // Look for emperors ahead and steer around them
      for(const emp of dots){
        if(emp.dead || emp.type!=='emperor') continue;
        const dx = emp.x - d.x, dy = emp.y - d.y;
        const dist = Math.hypot(dx, dy);
        const avoidR = emp.size + d.size + 25; // wide berth
        if(dist < avoidR && dist > 0.01){
          // Project distance onto march direction; if emperor is roughly ahead, steer perpendicular
          const fwd = dx*d._warDir[0] + dy*d._warDir[1];
          if(fwd > -emp.size){
            // Perpendicular to march direction
            const px = -d._warDir[1], py = d._warDir[0];
            // Side based on which side of march line emperor sits
            const side = dx*px + dy*py;
            const steer = side >= 0 ? -1 : 1;
            const strength = (1 - dist/avoidR) * 5;
            vx += px * steer * strength;
            vy += py * steer * strength;
          }
        }
      }
      // Re-normalize to maintain consistent speed
      const sp = Math.hypot(vx, vy) || 1;
      d.vx = (vx/sp) * 4;
      d.vy = (vy/sp) * 4;
      if(d.x < -d.size || d.x > CW+d.size || d.y < -d.size || d.y > CH+d.size){
        d._warOff = true;
        d._warReturnAt = performance.now() + (2000 + Math.random()*3000);
      }
    }
    if(d._warOff){
      if(performance.now() >= d._warReturnAt){
        d.dead = true;
      }
    }
  }

  // ── Elite: rings persist while any of their elite dots are alive
  if(elites.length>0){
    // Any dot now FULLY inside a ring (whole body inside) gets recruited - except politicians and alarmists
    for(const d of dots){
      if(d.dead||d._elite||d.type==='church'||d.type==='media') continue;
      if(d.type==='politician'||d.faction==='politician') continue;
      if(d._infected && d.type==='normal') continue; // alarmists bounce off, handled in post-physics clamp
      for(const el of elites){
        const dx=d.x-el.x, dy=d.y-el.y;
        const dist=Math.hypot(dx,dy);
        if(dist + d.size <= el.r){
          if(d.type==='revolutionary'||d.type==='tyrant'||d.type==='emperor'){
            cascadeNeutralize(d);
          }
          d.type='normal'; d.faction=null;
          d._eliteId = el.id;
          d._elite = true;
          d._eliteFullyIn = true; d._infected=false; d._panicked=false; d._cureTouches=null;
          d.color = '#28231E';
          d._chaosFlashColor = undefined; d._chaosFlashUntil = 0;
          d._demoralized = false; d._flashColor = null; d._flashUntil = 0; d._ringR = undefined;
          d.maxAge = d.age + Math.floor((90 + Math.random()*10) * 60);
          break;
        }
      }
    }
    // Drop rings whose elite dots are all dead
    elites = elites.filter(el => dots.some(d => !d.dead && d._eliteId === el.id));
    // Final post-physics clamps: elites stay in, outsiders stay out
    for(const d of dots){
      if(d.dead) continue;
      if(d._elite && d._eliteId){
        const ring = elites.find(e => e.id === d._eliteId);
        if(!ring) continue;
        const dx = d.x - ring.x, dy = d.y - ring.y;
        const dist = Math.hypot(dx, dy);
        const maxR = ring.r - d.size;
        if(dist > maxR && dist > 0.01){
          const nx = dx/dist, ny = dy/dist;
          d.x = ring.x + nx*maxR;
          d.y = ring.y + ny*maxR;
          const vn = d.vx*nx + d.vy*ny;
          if(vn > 0){ d.vx -= (1+0.5)*vn*nx; d.vy -= (1+0.5)*vn*ny; }
        }
      } else if(!d._elite && d.type!=='church' && d.type!=='media'){
        const isPolLeader = d.type==='politician';
        const isAlarmist = d._infected && d.type==='normal';
        for(const ring of elites){
          const dx = d.x - ring.x, dy = d.y - ring.y;
          const dist = Math.hypot(dx, dy);
          if(isPolLeader || isAlarmist){
            // Politician LEADERS and alarmists bounce off the ring AND convert to elite-aligned (black)
            const minR = ring.r + d.size;
            if(dist < minR && dist > 0.01){
              const nx = dx/dist, ny = dy/dist;
              d.x = ring.x + nx*minR;
              d.y = ring.y + ny*minR;
              const vn = d.vx*nx + d.vy*ny;
              if(vn < 0){ d.vx -= 2*vn*nx; d.vy -= 2*vn*ny; }
              if(!d._eliteAligned){
                d.color = '#28231E';
                if(!isAlarmist) d.faction = 'elite';
                d._eliteAligned = true;
              }
              break;
            }
          } else {
            // Everyone else (including followers of all factions) recruited when fully inside
            if(dist + d.size <= ring.r){
              if(d.type==='revolutionary'||d.type==='tyrant'||d.type==='emperor'){
                cascadeNeutralize(d);
              }
              d.type='normal'; d.faction=null;
              d._eliteId = ring.id;
              d._elite = true;
              d._eliteFullyIn = true; d._infected=false; d._panicked=false; d._cureTouches=null;
              d.color = '#28231E';
              d._chaosFlashColor = undefined; d._chaosFlashUntil = 0;
              d._demoralized = false; d._flashColor = null; d._flashUntil = 0; d._ringR = undefined;
              d.maxAge = d.age + Math.floor((90 + Math.random()*10) * 60);
              break;
            }
          }
        }
      }
    }
    // Outsiders shrink while any ring exists (elites outside their ring also shrink; elite-aligned and emperors exempt)
    if(elites.length>0){
      for(const d of dots){
        if(d.dead||d.type==='church'||d.type==='media') continue;
        if(isEliteInRing(d)) continue;
        if(d.faction==='elite') continue;
        if(d.type==='emperor') continue;
        if(d.type==='tyrant' && d.crowned) continue;
        if(d.type==='revolutionary' && d.crowned) continue;
        if(d.size>MIN_SZ) d.size=Math.max(MIN_SZ, d.size-0.0033);
      }
      // Spawn size also decays at same rate
      if(spawnSize>MIN_SZ) spawnSize=Math.max(MIN_SZ, spawnSize-0.0033);
      // Persistent elite conversion — every 120 frames (2 sec)
      eliteFrames = (eliteFrames||0) + 1;
      if(eliteFrames >= 120){
        eliteFrames = 0;
        const isExempt = d => d.dead || d.type==='church' || d.type==='media' || d.type==='thug' || isEliteInRing(d) || d.faction==='elite' || d.type==='emperor' || (d.type==='tyrant' && d.crowned) || (d.type==='revolutionary' && d.crowned) || d._infected;
        const eligible = dots.filter(d => !isExempt(d));
        // If an emperor exists, the elite quietly convert outsiders to the emperor's colour. Otherwise grey them.
        const liveEmperor = dots.find(d => !d.dead && d.type==='emperor');
        const targetColor = liveEmperor ? liveEmperor.color : 'white';
        const targetFaction = liveEmperor ? 'emperor' : null;
        const offColour = eligible.filter(d => d.color !== targetColor);
        if(offColour.length > 0){
          const toConvert = Math.ceil(eligible.length * 0.05);
          offColour.sort((a,b) => a.size - b.size);
          for(let i=0;i<Math.min(toConvert, offColour.length);i++){
            const pickRange = Math.max(1, Math.ceil(offColour.length * 0.6));
            const idx = Math.floor(Math.random()*pickRange);
            const d = offColour[idx];
            if(!d) continue;
            d.color = targetColor; d.faction = targetFaction; d.type = 'normal';
            d._infected = false; d._panicked = false; d._cureTouches = null;
            d.crowned = false;
            offColour.splice(idx, 1);
          }
        }
      }
    } else {
      eliteFrames = 0;
    }
  }
  // Restore spawn size when no rings exist
  if(elites.length===0 && spawnSize<10){
    spawnSize=Math.min(10, spawnSize+0.01);
  }

  // ── Media: dots within the conversion annulus around any media building get captivated.
  // After ~3 seconds in range, they convert to media's colour and walk off.
  {
    const medias = dots.filter(d => !d.dead && d.type==='media');
    if(medias.length > 0){
      const isMediaImmune = d => d.dead || d.type==='media' || d.type==='church' || d.type==='tyrant' || d.type==='emperor' || d.type==='revolutionary' || d.type==='politician' || d.type==='thug' || d._elite || d._atWar || d._warOff || d._infected || d.faction==='church' || d._inChurch;
      for(const d of dots){
        if(isMediaImmune(d)) { d._mediaFrames = 0; continue; }
        let inRange = false;
        let captivatedBy = null;
        for(const m of medias){
          const dx = d.x - m.x, dy = d.y - m.y;
          const dist = Math.hypot(dx, dy);
          const innerR = m.size + 6;     // no-contact (matches effR for media)
          const outerR = m.size + 36;    // conversion radius (annulus extends ~30 units past the no-contact ring)
          if(dist >= innerR && dist <= outerR){
            // Demoralised dots can only be captivated by coloured media (not white)
            if(d._demoralized && m.color === 'white') continue;
            inRange = true;
            captivatedBy = m;
            break;
          }
        }
        if(inRange && captivatedBy){
          d._mediaFrames = (d._mediaFrames || 0) + 1;
          // Slow them down while listening
          d.vx *= 0.85;
          d.vy *= 0.85;
          // Gentle pull toward the mouthpiece (centripetal — keeps them lingering nearby)
          const adx = captivatedBy.x - d.x, ady = captivatedBy.y - d.y;
          const adist = Math.hypot(adx, ady) || 1;
          d.vx += (adx/adist) * 0.04;
          d.vy += (ady/adist) * 0.04;
          if(d._mediaFrames >= 120){ // 2 seconds at 60fps
            d.color = captivatedBy.color;
            d.faction = null;
            // Free from demoralisation; permanent immunity to re-demoralisation
            if(d._demoralized){
              d._demoralized = false;
              d._flashColor = null;
              d._flashUntil = 0;
              d._ringR = undefined;
            }
            d._mediaConverted = true;
            // Walk off: strong outward velocity away from media
            const dx = d.x - captivatedBy.x, dy = d.y - captivatedBy.y;
            const dist = Math.hypot(dx, dy) || 1;
            const sp = 3;
            d.vx = (dx/dist) * sp;
            d.vy = (dy/dist) * sp;
            d._mediaFrames = 0;
          }
        } else {
          d._mediaFrames = 0;
        }
      }
    }
  }

  // If an emperor died this frame, revert recoloured dots
  {
    const deadEmperors = dots.filter(d => d.dead && d.type==='emperor');
    if(deadEmperors.length > 0){
      // Check if there's any other live emperor to inherit; if so, just keep recolour to that emperor's colour
      const liveEmp = dots.find(d => !d.dead && d.type==='emperor');
      for(const o of dots){
        if(o._preEmpColor===undefined) continue;
        if(liveEmp){
          o.color = liveEmp.color; // re-recolour to the surviving emperor
        } else {
          o.color = o._preEmpColor;
          if(o._preEmpFaction){
            o.faction = o._preEmpFaction;
            o._preEmpFaction = undefined;
          }
          o._preEmpColor = undefined;
        }
      }
    }
  }
  if(dots.some(d=>d.dead)) dots=dots.filter(d=>!d.dead);
  for(const d of dots) d.draw(t);
  // Walls — clean thin lines (skipping inside any elite ring)
  ctx.save();
  // Build a clip path covering the whole canvas EXCEPT elite ring interiors
  if(elites.length > 0){
    ctx.beginPath();
    ctx.rect(0, 0, CW, CH);
    for(const el of elites){
      // Subtract circle via counter-clockwise arc
      ctx.moveTo(el.x + el.r, el.y);
      ctx.arc(el.x, el.y, el.r, 0, Math.PI*2, true);
    }
    ctx.clip('evenodd');
  }
  ctx.strokeStyle='rgba(58,55,53,0.35)';
  ctx.lineWidth=0.75;
  ctx.lineCap='round';
  for(const w of walls){
    ctx.beginPath();
    ctx.moveTo(w.x1,w.y1);
    ctx.lineTo(w.x2,w.y2);
    ctx.stroke();
  }
  ctx.restore();
  if(drawingWall&&wallStart&&wallPreview){
    ctx.strokeStyle='#3A3735AA';ctx.lineWidth=2;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.moveTo(wallStart.x,wallStart.y);ctx.lineTo(wallPreview.x,wallPreview.y);ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.lineCap='butt';
  _endGameCalledThisFrame = false;
  drawFX();checkWin();
  if(!_endGameCalledThisFrame && pendingWin){
    pendingWin = null; // conditions no longer met, cancel pending
  }
  if(pendingWin){
    pendingWin.frames++;
    if(pendingWin.frames >= 1200){
      commitEndGame(pendingWin.title, pendingWin.color, pendingWin.stats);
    }
  }
}

// ── Boot ─────────────────────────────────────────────────────
document.getElementById('begin-btn').addEventListener('click',()=>{
  document.getElementById('start-overlay').style.display='none'; startGame();
});
document.getElementById('begin-btn').addEventListener('touchend',e=>{
  e.preventDefault();
  document.getElementById('start-overlay').style.display='none'; startGame();
},{passive:false});

sizeCanvas();
requestAnimationFrame(loop);
</script>
</body>
