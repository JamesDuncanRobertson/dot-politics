<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>POLITICS</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ECE7DF; --red:#B8695E; --blue:#607EA0;
  --text:#28231E; --mid:#6A6159; --dim:#A89E96;
  --rule:rgba(0,0,0,0.07); --font:'Jost',system-ui,sans-serif;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{position:fixed;width:100%;height:100%;overflow:hidden;}
body{
  position:fixed;width:100%;height:100%;overflow:hidden;
  background:var(--bg);font-family:var(--font);
  user-select:none;-webkit-user-select:none;
  display:flex;flex-direction:column;color:var(--text);
  padding-top:var(--safe-t);
}
#hud{display:flex;flex-direction:column;border-bottom:1px solid var(--rule);flex-shrink:0;}
.hud-top{position:relative;height:28px;display:flex;align-items:center;padding:0 20px;}
#dom-bar{height:14px;position:relative;background:transparent;border-top:1px solid var(--rule);overflow:hidden;display:flex;align-items:center;justify-content:center;}
#dom-fill{height:6px;background:var(--text);transition:width 0.3s ease,background-color 0.3s ease;width:0%;border-radius:3px;}
.f-block{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;padding:6px 4px;width:80px;}
.f-block.red{justify-content:flex-start;}
.f-block.blue{justify-content:flex-end;}
.f-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.f-block.red .f-pip{background:var(--red);}
.f-block.blue .f-pip{background:var(--blue);}
.f-count{font-size:22px;font-weight:400;letter-spacing:-0.3px;}
.f-block.red .f-count{color:var(--red);}
.f-block.blue .f-count{color:var(--blue);}
.hud-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.hud-name{font-size:13px;font-weight:400;letter-spacing:7px;text-transform:uppercase;color:var(--dim);}
#dom-pct-row{display:flex;align-items:center;justify-content:center;gap:32px;padding:4px 0;}
#dom-pct{font-size:22px;font-weight:300;letter-spacing:2px;color:var(--dim);text-align:center;font-variant-numeric:tabular-nums;min-width:70px;}
#pop-count{font-size:22px;font-weight:300;letter-spacing:2px;color:var(--dim);text-align:center;padding:6px 0 4px;font-variant-numeric:tabular-nums;}
#status{font-size:8px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--dim);min-height:11px;transition:color .4s;}
#c{display:block;cursor:crosshair;flex:1;min-height:0;touch-action:none;-webkit-tap-highlight-color:transparent;}
#bottom{display:flex;flex-direction:column;border-top:1px solid var(--rule);flex-shrink:0;padding-bottom:var(--safe-b);}
.btn-row{height:44px;display:flex;border-bottom:1px solid var(--rule);}
.btn-row:last-child{border-bottom:none;}
#birthbar, .bbar{display:flex;align-items:center;gap:12px;padding:6px 18px;border-top:1px solid var(--rule);flex-shrink:0;}
.bb-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);font-weight:400;width:60px;flex-shrink:0;}
#birth-slider, #action-slider, #life-slider{flex:1;-webkit-appearance:none;appearance:none;background:transparent;height:18px;cursor:pointer;}
#birth-slider::-webkit-slider-runnable-track, #action-slider::-webkit-slider-runnable-track, #life-slider::-webkit-slider-runnable-track{height:1px;background:var(--mid);}
#birth-slider::-webkit-slider-thumb, #action-slider::-webkit-slider-thumb, #life-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text);margin-top:-6px;cursor:pointer;}
#birth-slider::-moz-range-track, #action-slider::-moz-range-track, #life-slider::-moz-range-track{height:1px;background:var(--mid);}
#birth-slider::-moz-range-thumb, #action-slider::-moz-range-thumb, #life-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--text);cursor:pointer;border:none;}
.act-btn{
  flex:1;background:transparent;border:none;border-right:1px solid var(--rule);
  font-family:var(--font);font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:6px;
  -webkit-tap-highlight-color:transparent;transition:color .15s,background .15s;
}
.act-btn:last-child{border-right:none;}
.act-btn:active{opacity:.6;}
.act-btn.active{color:var(--text);background:rgba(58,55,53,0.06);}
#reset-btn{background:transparent;border:none;cursor:pointer;color:var(--dim);font-size:20px;line-height:1;padding:4px 8px;-webkit-tap-highlight-color:transparent;}
#reset-btn:hover{color:var(--text);}
#pause-btn{background:transparent;border:none;cursor:pointer;color:var(--dim);font-size:20px;line-height:1;padding:4px 8px;-webkit-tap-highlight-color:transparent;}
#pause-btn:hover,#reset-btn:hover{color:var(--text);}
.overlay{
  position:fixed;inset:0;z-index:200;background:rgba(236,231,223,0.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 32px;padding-top:calc(24px + var(--safe-t));
}
.ov-title{font-size:clamp(40px,12vw,100px);font-weight:300;letter-spacing:clamp(8px,3vw,22px);text-transform:uppercase;color:var(--text);line-height:1;margin-bottom:18px;text-align:center;text-indent:clamp(8px,3vw,22px);}
.ov-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--mid);margin-bottom:48px;text-align:center;}
.ov-btn{background:none;border:1px solid rgba(0,0,0,0.15);color:var(--mid);font-family:var(--font);font-size:10px;font-weight:400;letter-spacing:5px;text-transform:uppercase;padding:14px 52px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ov-btn:active{background:rgba(0,0,0,0.04);}
#win-overlay{display:none;}
#win-label{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--dim);margin-bottom:16px;}
#win-title{font-size:clamp(28px,7vw,64px);font-weight:300;letter-spacing:clamp(4px,2vw,14px);text-transform:uppercase;line-height:1.2;margin-bottom:10px;text-align:center;}
#win-stats{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--dim);margin-bottom:48px;}
</style>
</head>
<body>

<div class="overlay" id="start-overlay">
  <div class="ov-title">Politics</div>
  <div class="ov-sub">Large and in charge</div>
  <button class="ov-btn" id="begin-btn">Enter</button>
</div>

<div class="overlay" id="win-overlay">
  <div id="win-label">Result:</div>
  <div id="win-title"></div>
  <div id="win-stats"></div>
  <button class="ov-btn" onclick="startGame()">Again</button>
</div>

<div id="hud">
  <div class="hud-top">
    <div class="f-block red" id="r-btn"><div class="f-pip"></div><div class="f-count" id="rcount">10</div></div>
    <div class="hud-mid">
      <div class="hud-name">Politics</div>
    </div>
    <div class="f-block blue" id="b-btn"><div class="f-count" id="bcount">10</div><div class="f-pip"></div></div>
  </div>
  <div id="dom-pct-row">
    <button id="reset-btn" title="Reset">↻</button>
    <div id="dom-pct">0%</div>
    <button id="pause-btn" title="Pause">⏸</button>
  </div>
  <div id="dom-bar">
    <div id="dom-fill"></div>
  </div>
</div>

<canvas id="c"></canvas>

<div class="bbar" id="birthbar">
  <span class="bb-label">Birthrate</span>
  <input type="range" id="birth-slider" min="0" max="120" value="60" />
</div>
<div class="bbar" style="border-top:none;">
  <span class="bb-label">Lifespan</span>
  <input type="range" id="life-slider" min="10" max="110" step="5" value="60" />
</div>
<div class="bbar" style="border-top:none;">
  <span class="bb-label">Activity</span>
  <input type="range" id="action-slider" min="-2" max="2" step="0.1" value="0" />
</div>
<div id="bottom">
  <div class="btn-row">
    <button class="act-btn" id="pol-r-btn" style="color:var(--red);">Politician</button>
    <button class="act-btn" id="red-btn" style="color:var(--red);">Red</button>
    <button class="act-btn" id="cit-btn">Citizen</button>
    <button class="act-btn" id="blue-btn" style="color:var(--blue);">Blue</button>
    <button class="act-btn" id="pol-b-btn" style="color:var(--blue);">Politician</button>
  </div>
  <div class="btn-row">
    <button class="act-btn" id="populist-btn">Populist</button>
    <button class="act-btn" id="plague-btn">Alarmist</button>
    <button class="act-btn" id="rev-btn">Revolutionary</button>
    <button class="act-btn" id="church-btn">Church</button>
    <button class="act-btn" id="emp-btn">Tyrant</button>
    <button class="act-btn" id="thug-btn">Thugs</button>
    <button class="act-btn" id="elite-btn">Elite</button>
  </div>
  <div class="btn-row">
    <button class="act-btn" id="media-btn">Media</button>
    <button class="act-btn" id="war-btn">War</button>
    <button class="act-btn" id="disaster-btn">Disaster</button>
    <button class="act-btn" id="depression-btn">Depression</button>
    <button class="act-btn" id="div-btn">Division</button>
    <button class="act-btn" id="unify-btn">Unity</button>
    <button class="act-btn" id="brain-btn">Brainwash</button>
    <button class="act-btn" id="demor-btn">Demoralise</button>
    <button class="act-btn" id="chaos-btn">Chaos</button>
  </div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let CW, CH, DPR = 1;

function sizeCanvas() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  const vv  = window.visualViewport;
  const vw  = vv ? vv.width  : window.innerWidth;
  const vh  = vv ? vv.height : window.innerHeight;
  const hudH = document.getElementById('hud').offsetHeight;
  const botH = document.getElementById('bottom').offsetHeight;
  let barH = 0;
  for(const el of document.querySelectorAll('.bbar')) barH += el.offsetHeight;
  CW = Math.floor(vw);
  CH = Math.max(200, Math.floor(vh) - hudH - botH - barH);
  canvas.width        = Math.round(CW * DPR);
  canvas.height       = Math.round(CH * DPR);
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(DPR, DPR);
}
window.addEventListener('resize', sizeCanvas);
if (window.visualViewport) window.visualViewport.addEventListener('resize', sizeCanvas);

// ── Constants ────────────────────────────────────────────────
const MIN_SZ=4, MAX_SZ=70, SHRINK=2, GROW=2, BOUNCE=0.82, EMP_SIZE=36;
let birthRate=60, birthFrames=0, actionRate=1, paused=false, lifeSeconds=60, spawnSize=10;

// ── Palettes ─────────────────────────────────────────────────
const POL_PALETTE = ['#C4A24E','#B58656','#A89060'];
const REV_PALETTE = ['#5A9FA4','#7A9ABF','#9A7ABF','#7ABF9A','#BF9A7A','#9ABF7A'];
const EMP_PALETTE = ['#7A5E8A','#8A5E6A','#5E7A66','#5E6A8A','#8A6E5E','#6A6E78'];
let polIdx = 0, revIdx = 0, empIdx = 0, churchCornerIdx = 0;

const FILL   = { red:'#B8695E', blue:'#607EA0', white:'#B8AFA6' };
const STROKE = { red:'#9E5A50', blue:'#4E6888', white:'#A09790' };

function darkenHex(hex, amt=0.13) {
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,(n>>16)-Math.round(amt*255));
  const g=Math.max(0,((n>>8)&0xff)-Math.round(amt*255));
  const b=Math.max(0,(n&0xff)-Math.round(amt*255));
  return `rgb(${r},${g},${b})`;
}

function parseRGB(s){
  if(s.startsWith('#')){
    const n=parseInt(s.slice(1),16);
    return [(n>>16)&0xff,(n>>8)&0xff,n&0xff];
  }
  const m=s.match(/rgb\((\d+),(\d+),(\d+)\)/);
  if(m) return [+m[1],+m[2],+m[3]];
  return [180,180,180];
}

function getDisplay(color) {
  if (color.startsWith('#')) return { fill: color, stroke: darkenHex(color) };
  return { fill: FILL[color]||'#999', stroke: STROKE[color]||'#777' };
}

let currentPlayer = 'red';
function setPlayer(p){
  currentPlayer = p;
}

// ── Dot ──────────────────────────────────────────────────────
class Dot {
  constructor(x, y, color, type='normal', faction=null) {
    this.x=x; this.y=y;
    this.color=color;
    this.type=type;
    this.faction=faction;
    this.size = type==='politician' ? 11 : type==='revolutionary' ? 7 : type==='emperor' ? EMP_SIZE : type==='church' ? 30 : spawnSize;
    const base = type==='politician' ? 0.85 : type==='revolutionary' ? 4.8 : type==='emperor' ? 0.5 : type==='tyrant' ? 1.7 : type==='church' ? 0 : 1.2+Math.random()*0.8;
    const spd = base*(0.6+Math.random()*0.8);
    const a = Math.random()*Math.PI*2;
    this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
    this.crowned=false; this._crownFrames=0;
    // Per-dot lifespan variance factor 0.83–1.17. Lifespan locked at birth — slider only affects new dots.
    this.age = 0;
    this._lifeVariance = 0.83 + Math.random()*0.34;
    this._lifeSeconds = lifeSeconds;
    // Display colour eases toward logical colour to mask flicker
    const dc=getDisplay(this.color);
    this._dispFill=parseRGB(dc.fill);
    this._dispStroke=parseRGB(dc.stroke);
  }

  ascendToEmperor(){
    const oldFaction=this.faction;
    this.type='emperor'; this.faction='emperor';
    this.ascendedFrom=oldFaction;
    const sp=Math.hypot(this.vx,this.vy)||0.1;
    const base=0.5*(0.6+Math.random()*0.8);
    this.vx=this.vx/sp*base; this.vy=this.vy/sp*base;
    const empColor = this.color;
    for(const o of dots){
      if(o===this||o.dead) continue;
      // Migrate same-colour same-old-faction followers to emperor faction (existing rule)
      if(o.color===this.color && o.faction===oldFaction && o.type==='normal'){
        o.faction='emperor';
        if(oldFaction==='revolutionary') o._revOrigin = true;
        const sp2=Math.hypot(o.vx,o.vy)||0.1;
        o.vx=o.vx/sp2*(sp2*0.4); o.vy=o.vy/sp2*(sp2*0.4);
        continue;
      }
      // Politicians: recolour to emperor; keep type/faction
      if(o.type==='politician'){
        if(o._preEmpColor===undefined) o._preEmpColor = o.color;
        o.color = empColor;
        continue;
      }
      if(o.faction==='politician'){
        if(o._preEmpColor===undefined){ o._preEmpColor = o.color; o._preEmpFaction = o.faction; }
        o.color = empColor;
        continue;
      }
      // Church building: recolour, keep type/faction
      if(o.type==='church'){
        if(o._preEmpColor===undefined) o._preEmpColor = o.color;
        o.color = empColor;
        continue;
      }
      // Church follower: recolour AND defect to emperor faction
      if(o.type==='normal' && o.faction==='church'){
        if(o._preEmpColor===undefined){ o._preEmpColor = o.color; o._preEmpFaction = 'church'; }
        o.color = empColor;
        o.faction = 'emperor';
        continue;
      }
      // Elite: recolour, keep elite faction/flag
      if(o._elite || o.faction==='elite'){
        if(o._preEmpColor===undefined) o._preEmpColor = o.color;
        o.color = empColor;
        continue;
      }
    }
  }

  ascendToTyrant(){
    this.type='tyrant'; this.faction=null;
    this.ascendedFrom='revolutionary';
    for(const o of dots){
      if(o===this||o.dead) continue;
      if(o.color===this.color && o.faction==='revolutionary' && o.type==='normal'){
        o.faction='emperor';
      }
    }
  }

  update() {
    if(this._inChurch){ this.vx=0; this.vy=0; return; }
    if(this._warOff){ return; }
    if(this._churchTouchFrames > 0) this._churchTouchFrames = Math.max(0, this._churchTouchFrames - 1);
    // Plague: infected dots die after 8 seconds (480 frames)
    if(this._infected){
      this._infectedFrames = (this._infectedFrames||0) + 1;
      if(this._panicked){
        // Panicked: keep speed high
        const sp = Math.hypot(this.vx,this.vy)||0.1;
        const target = 4;
        const newSp = sp + (target - sp)*0.1;
        this.vx = this.vx/sp * newSp;
        this.vy = this.vy/sp * newSp;
      } else {
        // Calmed: shrink & slow quickly
        this.vx *= 0.94;
        this.vy *= 0.94;
        if(this.size>MIN_SZ) this.size = Math.max(MIN_SZ, this.size - 0.01);
      }
    }
    // Natural lifespan: dots age each frame; lifespan scales with size. Churches and crowned revolutionaries (= emperors) exempt.
    if(this.type!=='church' && !(this.type==='revolutionary' && this.crowned)){
      this.age++;
      // Elites have a separate fixed lifespan set when they become elite (see recruit blocks)
      if(this._elite){
        if(this.age>=this.maxAge){ this.dead=true; return; }
      } else {
        const effLife = (this._lifeSeconds||lifeSeconds) * 60 * (this.size/10) * this._lifeVariance;
        if(this.age >= effLife){ this.dead=true; return; }
      }
    }
    // Elite dots: slowly grow up to size 10 if smaller (0.03/frame ≈ ~3 seconds 4→10)
    if(this._elite && this.size<10){
      this.size = Math.min(10, this.size + 0.03);
      this._eliteRipeFrames = 0;
    } else if(this._elite){
      this._eliteRipeFrames = (this._eliteRipeFrames || 0) + 1;
    }
    if(this.type==='media'){
      this.vx=0; this.vy=0;
      // Lifespan: media is permanent (no natural death)
      return;
    }
    if(this.type==='church'){
      this.vx=0; this.vy=0;
      let fc=0;
      for(const d of dots) if(!d.dead && d!==this && d.faction==='church' && d.color===this.color && d.type==='normal' && !d._inChurch) fc++;
      if(fc>0) this.hadFollowers=true;
      this._followerCount = fc;
      // size derived dynamically in checkWin tick; just enforce death
      if(this.hadFollowers && fc===0) this.dead=true;
    }
    if(this.type==='tyrant'){
      const fc=emperorFollowerCount[this.color]||0;
      const target=Math.min(100, Math.max(MIN_SZ, 10+fc));
      const next = this.size + (target - this.size) * 0.15;
      // Don't shrink during brainwash or while an elite ring exists (immune to indirect effects)
      const protectFromShrink = globalBrainwash || elites.length>0;
      this.size = protectFromShrink ? Math.max(this.size, next) : next;
    }
    // Ascension: tyrant ascends to emperor when crowned. Revolutionary ascends to TYRANT when too big.
    if(this.type==='tyrant' && this.crowned){
      this.ascendToEmperor();
    }
    if(this.type==='revolutionary' && !this.crowned){
      const fc=revFollowerCount[this.color]||0;
      const targetSpeed = Math.min(8, 2.5 + Math.sqrt(fc)*1.2);
      const sp=Math.hypot(this.vx,this.vy)||1;
      const newSp = sp + (targetSpeed - sp) * 0.05;
      this.vx=this.vx/sp*newSp; this.vy=this.vy/sp*newSp;
    }
    // Rev follower speed scales with follower count
    if(this.type==='normal' && this.faction==='revolutionary'){
      const fc=revFollowerCount[this.color]||0;
      const targetSpeed = Math.min(7, 1.5 + Math.sqrt(fc)*1.0);
      // Avoid zero-velocity freeze: if perfectly still, give a random direction first
      if(this.vx === 0 && this.vy === 0){
        const a = Math.random()*Math.PI*2;
        this.vx = Math.cos(a) * 0.1;
        this.vy = Math.sin(a) * 0.1;
      }
      const sp=Math.hypot(this.vx,this.vy)||1;
      const newSp = sp + (targetSpeed - sp) * 0.05;
      this.vx=this.vx/sp*newSp; this.vy=this.vy/sp*newSp;
    }
    if(this.type==='emperor'){
      const fc=emperorFollowerCount[this.color]||0;
      // With followers: 10 + fc. Without followers: shrinks to MIN_SZ
      const target = fc>0 ? Math.min(100, 10+fc) : MIN_SZ;
      const next = this.size + (target - this.size) * 0.15;
      const protectFromShrink = globalBrainwash || elites.length>0;
      this.size = protectFromShrink ? Math.max(this.size, next) : next;
      if(this.hadFollowers && fc===0 && this.size<=MIN_SZ+1 && !protectFromShrink) this.dead=true;
      if(fc>0) this.hadFollowers=true;
    }
    // Emperor followers that originated from a revolutionary wear off to neutral
    if(this.type==='normal' && this.faction==='emperor' && this._revOrigin){
      if(Math.random() < 0.00384){ // ~3s half-life
        this.faction=null; this.color='white'; this.crowned=false;
        this._wasRev = true; this._revOrigin = false;
      }
    }
    if(this.type !== 'emperor' && !(this.type === 'tyrant' && this.crowned)){
      this.x+=this.vx*actionRate; this.y+=this.vy*actionRate;
    }
    if(this.crowned && !(this.type==='normal' && (this.faction==='revolutionary' || this.faction==='church'))){
      this.vx=0; this.vy=0;
    }
    if(this.type==='emperor'){
      this.vx=0; this.vy=0; // emperor position completely locked
    }
    if(this.type!=='tyrant' && this.type!=='emperor'){
      this.size=Math.max(MIN_SZ,Math.min(MAX_SZ,this.size));
    } else {
      this.size=Math.max(MIN_SZ,Math.min(100,this.size));
    }
    const r = (this.crowned && !(this.type==='normal' && (this.faction==='revolutionary' || this.faction==='church'))) ? this.size+9 : this.size;
    if(!this._atWar && !(this._bwT>0)){
      if(this.x<r)    {this.x=r;    this.vx= Math.abs(this.vx);}
      if(this.x>CW-r) {this.x=CW-r; this.vx=-Math.abs(this.vx);}
      if(this.y<r)    {this.y=r;    this.vy= Math.abs(this.vy);}
      if(this.y>CH-r) {this.y=CH-r; this.vy=-Math.abs(this.vy);}
    } else if(this._bwT>0){
      // Clamp position but don't flip velocity
      if(this.x<r)    this.x=r;
      if(this.x>CW-r) this.x=CW-r;
      if(this.y<r)    this.y=r;
      if(this.y>CH-r) this.y=CH-r;
    }
    // Elite containment runs post-physics (see main loop), not here
    const spd=Math.hypot(this.vx,this.vy);
    const mx=this.type==='revolutionary'?9:this.type==='emperor'?3:5;
    if(spd>mx  &&spd>0){this.vx*=mx/spd;  this.vy*=mx/spd;}
    // Min speed clamp does not apply to dots currently being brainwashed
    if(spd<0.28&&spd>0 && !(this._bwT>0)){this.vx*=0.28/spd;this.vy*=0.28/spd;}
    // Ex-rev followers should never be stuck at zero velocity
    if(this._wasRev && spd === 0){
      const a = Math.random()*Math.PI*2;
      this.vx = Math.cos(a) * 1.2;
      this.vy = Math.sin(a) * 1.2;
    }
  }

  draw(t) {
    if(this._inChurch) return; // hidden inside church
    if(this._warOff) return; // off-screen at war
    const target = (this._chaosFlashColor)
      ? getDisplay(this._chaosFlashColor)
      : (this._demoralized && this._flashColor)
        ? getDisplay(this._flashColor)
        : getDisplay(this.color);
    const tf=parseRGB(target.fill), ts=parseRGB(target.stroke);
    const k=0.18; // ease factor — ~5 frames to settle, 200ms at 60fps
    this._dispFill[0]+=(tf[0]-this._dispFill[0])*k;
    this._dispFill[1]+=(tf[1]-this._dispFill[1])*k;
    this._dispFill[2]+=(tf[2]-this._dispFill[2])*k;
    this._dispStroke[0]+=(ts[0]-this._dispStroke[0])*k;
    this._dispStroke[1]+=(ts[1]-this._dispStroke[1])*k;
    this._dispStroke[2]+=(ts[2]-this._dispStroke[2])*k;
    let fill, stroke;
    if(this._infected && this.color === '#ffb3de'){
      // Unrecruited alarmists render explicit pink
      fill='rgb(255,179,222)';
      stroke='rgb(200,130,180)';
    } else {
      fill=`rgb(${Math.round(this._dispFill[0])},${Math.round(this._dispFill[1])},${Math.round(this._dispFill[2])})`;
      stroke=`rgb(${Math.round(this._dispStroke[0])},${Math.round(this._dispStroke[1])},${Math.round(this._dispStroke[2])})`;
    }
    ctx.save();
    const dsz = this.size;
    ctx.beginPath();
    ctx.arc(this.x,this.y,dsz,0,Math.PI*2);
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle=stroke; ctx.lineWidth=0.75; ctx.stroke();

    // Church: just a plain circle, no cross

    if(this.type==='politician' && !this._infected) {
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(t*0.001);
      const ringC=darkenHex(this.color.startsWith('#')?this.color:'#BF9E58',0.05);
      for(let i=0;i<6;i++){
        const a0=(i/6)*Math.PI*2;
        ctx.beginPath(); ctx.arc(0,0,this.size+6,a0,a0+0.28);
        ctx.strokeStyle=ringC+'99'; ctx.lineWidth=1.5; ctx.stroke();
      }
      ctx.restore();
    }

    if(this.type==='revolutionary' && !this._infected) {
      const p=0.5+0.5*Math.sin(t*0.012);
      const ringC=this.color.startsWith('#')?this.color:'#5A9FA4';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size+4+p*3,0,Math.PI*2);
      ctx.strokeStyle=ringC+(Math.round((0.3+p*0.2)*255).toString(16).padStart(2,'0'));
      ctx.lineWidth=1; ctx.stroke();
    }

    if(this.crowned && !this._infected && (this.type==='tyrant'||this.type==='revolutionary'||this.type==='emperor'||this.type==='church')){
      ctx.strokeStyle='rgba(58,55,53,0.35)';
      ctx.lineWidth=0.75;
      ctx.lineCap='round';
      const cs = this.size;
      ctx.beginPath(); ctx.arc(this.x, this.y, cs+3, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(this.x, this.y, cs+6, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(this.x, this.y, cs+9, 0, Math.PI*2); ctx.stroke();
      ctx.lineCap='butt';
    }

    ctx.restore();
  }
  hits(px,py){return(px-this.x)**2+(py-this.y)**2<=(this.size+10)**2;}
}

function handleAction(clientX, clientY, player) {
  if(!running) return;
  const rect=canvas.getBoundingClientRect();
  const mx=(clientX-rect.left)*(CW/rect.width);
  const my=(clientY-rect.top)*(CH/rect.height);
  for(let i=dots.length-1;i>=0;i--) {
    const d=dots[i]; if(!d.hits(mx,my)) continue;
    if(d.type==='emperor') return;
    if(d.type==='church') return; // church buildings immune
    if(d.faction==='church'){
      // Church follower: convert to player colour (or white)
      d.color=player; d.faction=null; d.type='normal';
      addFX(mx,my,player,20); return;
    }
    if(d.type==='normal' && (d.faction==='revolutionary' || d.faction==='emperor')){
      const lt = d.faction==='revolutionary' ? 'revolutionary' : 'emperor';
      const leaderExists = dots.some(x => !x.dead && x.color===d.color && x.type===lt);
      if(leaderExists) return;
      d.color='white'; d.faction=null;
      addFX(mx,my,'white',20); return;
    }
    if(d.type==='tyrant'){ d.dead=true; addFX(mx,my,'white',24); return; }
    if(d.type==='revolutionary'){
      d.color=player; d.faction=null; d.type='normal';
      addFX(mx,my,player,26); return;
    }
    if(d.color===player){
      d.size=Math.min(MAX_SZ,d.size+3); addFX(mx,my,player,14);
    } else if(d.color==='white'){
      d.color=player; addFX(mx,my,player,20);
    } else {
      d.color='white'; d.faction=null; d.type='normal'; addFX(mx,my,'white',20);
    }
    return;
  }
}

function canvasPoint(ev){
  const r=canvas.getBoundingClientRect();
  const cx=ev.clientX!==undefined?ev.clientX:(ev.touches&&ev.touches[0]?ev.touches[0].clientX:0);
  const cy=ev.clientY!==undefined?ev.clientY:(ev.touches&&ev.touches[0]?ev.touches[0].clientY:0);
  return {x:cx-r.left, y:cy-r.top};
}

function medianCitizenSize(){
  // Returns the MODE of citizen sizes (rounded to nearest integer for binning)
  const sizes = dots.filter(d => !d.dead && d.type==='normal' && !d._elite && !d._infected).map(d => Math.round(d.size));
  if(sizes.length === 0) return 10;
  const counts = {};
  let bestBin = sizes[0], bestCount = 0;
  for(const s of sizes){
    counts[s] = (counts[s]||0) + 1;
    if(counts[s] > bestCount){ bestCount = counts[s]; bestBin = s; }
  }
  return bestBin;
}

document.getElementById('church-btn').addEventListener('click',()=>{
  if(!running) return;
  buttonsUsed.add('church');
  // Toggle off: if any church buildings exist, kill them all and leave followers untouched
  const existingChurches = dots.filter(d=>!d.dead && d.type==='church');
  if(existingChurches.length > 0){
    for(const ch of existingChurches){ ch.dead = true; }
    document.getElementById('church-btn').classList.remove('active');
    return;
  }
  document.getElementById('church-btn').classList.add('active');
  const inset=0;
  const corners=[[inset,inset],[CW-inset,inset],[CW-inset,CH-inset],[inset,CH-inset]];
  // Score each corner by how crowded it is (lower = clearer)
  const scored = corners.map(([cx,cy]) => {
    const blocked = dots.some(d=>!d.dead && d.type==='church' && Math.hypot(d.x-cx,d.y-cy)<60)
      || brainwashers.some(bw=>Math.hypot(bw.x-cx,bw.y-cy)<200)
      || dots.some(d=>!d.dead && d.type==='emperor' && d.size>30 && Math.hypot(d.x-cx,d.y-cy)<200);
    let mass = 0;
    for(const d of dots){
      if(d.dead) continue;
      const dx = d.x - cx, dy = d.y - cy;
      const distSq = dx*dx + dy*dy;
      if(distSq < 200*200){
        mass += d.size * d.size;
      }
    }
    return {cx, cy, blocked, mass};
  });
  // Sort by mass (clearest first), skipping blocked corners
  const candidates = scored.filter(s => !s.blocked).sort((a,b) => a.mass - b.mass);
  if(candidates.length === 0) return;
  const {cx, cy} = candidates[0];
  {
    {
      // If an emperor is alive, new church and followers spawn in the emperor's colour

      // Spawn 5 followers near the church, in the inward direction (away from canvas edges)
      // Determine inward arc based on which corner the church is at
      const inwardX = cx < CW/2 ? 1 : -1;
      const inwardY = cy < CH/2 ? 1 : -1;
      const baseAng = Math.atan2(inwardY, inwardX);
      for(let i=0;i<5;i++){
        // Spread across a quarter-circle (90°) around the inward direction
        const ang = baseAng + (-Math.PI/4) + (i/4)*Math.PI/2 + (Math.random()-0.5)*0.3;
        const dist = 70 + Math.random()*20;
        const fx = Math.min(CW-20, Math.max(20, cx + Math.cos(ang)*dist));
        const fy = Math.min(CH-20, Math.max(20, cy + Math.sin(ang)*dist));
        const follower = new Dot(fx, fy, spawnColor, 'normal', liveEmp ? 'emperor' : 'church');
        if(liveEmp){ follower._preEmpColor = '#7A9468'; follower._preEmpFaction = 'church'; }
        // Slow gentle velocity in a random inward direction
        const va = baseAng + (Math.random()-0.5)*Math.PI*0.6;
        follower.vx = Math.cos(va) * 0.5;
        follower.vy = Math.sin(va) * 0.5;
        dots.push(follower);
      }

});
// Region tracking for division logic
let regions = null;
function initRegions(){ regions = [{x:0, y:0, w:CW, h:CH}]; }

document.getElementById('div-btn').addEventListener('click',()=>{
  if(!running) return;
  buttonsUsed.add('div');
  if(!regions) initRegions();
  // Always pick the LARGEST region first; ties broken randomly
  let maxArea = 0;
  for(const r of regions){
    const a = r.w * r.h;
    if(a > maxArea) maxArea = a;
  }
  const largest = regions.filter(r => r.w*r.h >= maxArea - 0.01);
  const idx = regions.indexOf(largest[Math.floor(Math.random()*largest.length)]);
  const r = regions[idx];
  // Bisect perpendicular to longer axis; random tie-break
  const vertical = r.w > r.h ? true : r.h > r.w ? false : Math.random() < 0.5;
  let wall, a, b;
  if(vertical){
    const x = r.x + r.w/2;
    wall = {x1:x, y1:r.y, x2:x, y2:r.y+r.h};
    a = {x:r.x, y:r.y, w:r.w/2, h:r.h};
    b = {x:r.x+r.w/2, y:r.y, w:r.w/2, h:r.h};
  } else {
    const y = r.y + r.h/2;
    wall = {x1:r.x, y1:y, x2:r.x+r.w, y2:y};
    a = {x:r.x, y:r.y, w:r.w, h:r.h/2};
    b = {x:r.x, y:r.y+r.h/2, w:r.w, h:r.h/2};
  }
  walls.push(wall);
  regions.splice(idx, 1, a, b);
});

    patient._infectedFrames = 0;
    patient.color = '#ffb3de';
    patient.faction = null;
    patient.type = 'normal';
    const sp = Math.hypot(patient.vx, patient.vy) || 0.1;
    const targetSp = 4;
    patient.vx = patient.vx/sp * targetSp;
    patient.vy = patient.vy/sp * targetSp;
    candidates.splice(idx, 1);
  }
});

// ── Click FX ─────────────────────────────────────────────────
function addFX(x,y,color,maxR){
  const {fill}=getDisplay(color);
  fx.push({x,y,fill,r:maxR*.15,maxR,a:.8});
}
function drawFX(){
  for(let i=fx.length-1;i>=0;i--){
    const f=fx[i];
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.strokeStyle=f.fill+(Math.round(f.a*255).toString(16).padStart(2,'0'));
    ctx.lineWidth=1; ctx.stroke();
    f.r=Math.min(f.maxR,f.r+2.4); f.a-=0.055;
    if(f.a<=0) fx.splice(i,1);
  }
}

// ── Conversion helpers ───────────────────────────────────────
function neutralise(d){
  if(d.type==='tyrant'||d.type==='church'||d.faction==='church') return;
  if(d.faction==='politician'){ d.color='white'; return; }
  if(d.faction==='emperor') return;
  d.color='white'; d.faction=null; d.type='normal';
  d.size=Math.max(MIN_SZ,d.size-SHRINK);
}
function directConvert(d,toColor){
  if(d.type==='tyrant'||d.type==='church'||d.faction==='church') return;
  if(d.faction==='politician'){ d.color=toColor; return; }
  if(d.faction==='emperor') return;
  const wasWhite=d.color==='white';
  d.color=toColor; d.faction=null; d.type='normal';
  if(!wasWhite) d.size=Math.max(MIN_SZ,d.size-SHRINK);
}
function politicize(d,toColor,leader){
  if(d.type==='tyrant'||d.type==='church'||d.faction==='church') return;
  // Politician frees from demoralisation (do this before any early return)
  if(d._demoralized){
    d._demoralized = false;
    d._flashColor = null;
    d._flashUntil = 0;
    d._ringR = undefined;
  }
  if(d.faction==='politician'){ d.color=toColor; return; }
  d.color=toColor; d.faction='politician'; d.type='normal';
  d.crowned=false;
  // Inherit politician ID from leader (or any politician follower as proxy)
  if(leader){
    if(leader._polId) d._polId = leader._polId;
    else if(leader.faction==='politician') d._polId = leader._polId;
  }
  // growth applied by caller via tryGrow
  const spd=Math.hypot(d.vx,d.vy)||0.1;
  d.vx=d.vx/spd*Math.max(0.2,spd*0.45);
  d.vy=d.vy/spd*Math.max(0.2,spd*0.45);
}
function emperize(d,toColor){
  if(d.type==='tyrant'||d.type==='church') return;
  if(d.faction==='politician'){ d.color=toColor; return; }
  d.color=toColor; d.faction='emperor'; d.type='normal';
  const spd=Math.hypot(d.vx,d.vy)||0.1;
  d.vx=d.vx/spd*Math.max(0.15,spd*0.4);
  d.vy=d.vy/spd*Math.max(0.15,spd*0.4);
}
function cyanize(d,toColor){
  if(d.type==='tyrant'||d.type==='church') return;
  if(d._demoralized) return; // demoralised dots cannot be seduced
  if(d.faction==='politician'){ d.color=toColor; return; }
  d.color=toColor; d.faction='revolutionary'; d.type='normal';
  d.crowned=false;
  // growth applied by caller via tryGrow
}
function boostConvert(d){
  const sp=Math.hypot(d.vx,d.vy)||1, ns=Math.min(9,sp*1.6);
  d.vx=d.vx/sp*ns; d.vy=d.vy/sp*ns;
}
function cascadeNeutralize(parent){
  const f=parent.faction, c=parent.color;
  for(const d of dots){
    if(d===parent || d.dead) continue;
    if(d.color===c && d.faction===f && d.type==='normal'){
      if(f==='revolutionary') d._wasRev = true;
      d.color='white'; d.faction=null; d.crowned=false;
    }
  }
}
function isProtected(d){
  if(d._infected) return false;
  return d.crowned && (d.type==='revolutionary'||d.type==='politician'||d.type==='emperor'||d.type==='tyrant'||d.type==='church');
}

// Rate-limited growth: each dot can gain growth at most 10 times per second.
// Also: dots with 3+ same-colour neighbours touching cannot grow (anti-balloon).
function tryGrow(d, amount){
  // No growth during chaos
  if(globalChaos) return false;
  // Count same-colour neighbours touching d right now (no stale cache)
  let count=0;
  for(const o of dots){
    if(o===d||o.dead||o.color!==d.color) continue;
    const dx=o.x-d.x, dy=o.y-d.y;
    const md=d.size+o.size+8;
    if(dx*dx+dy*dy < md*md){ if(++count>=3) break; }
  }
  if(count>=3) return false;
  const now=performance.now();
  if(!d._growLog) d._growLog=[];
  while(d._growLog.length && now-d._growLog[0]>1000) d._growLog.shift();
  if(d._growLog.length>=10) return false;
  d.size=Math.min(MAX_SZ, d.size+amount);
  d._growLog.push(now);
  return true;
}

// ── Collisions ───────────────────────────────────────────────
function effR(d){
  // Media has a no-contact buffer so dots stay outside (small gap)
  if(d.type==='media') return d.size + 6;
  // Rev followers and church followers use plain size (no crown halo) so they don't stick artificially
  if(d.type==='normal' && d.faction==='revolutionary') return d.size;
  if(d.type==='normal' && d.faction==='church') return d.size;
  // Crowned dots have three rings out to +9 — use outermost as collision boundary
  if(d.crowned) return d.size+9;
  if(d.type==='emperor') return d.size+4;
  if(d.type==='tyrant') return d.size+2.5;
  return d.size;
}

function collide(){
  for(let i=0;i<dots.length;i++){
    if(dots[i].dead||dots[i]._inChurch||dots[i]._warOff) continue;
    for(let j=i+1;j<dots.length;j++){
      if(dots[j].dead||dots[j]._inChurch||dots[j]._warOff) continue;
      const a=dots[i],b=dots[j];
      // Soldiers phase through emperors entirely (steering handles avoidance)
      if((a._atWar && b.type==='emperor') || (b._atWar && a.type==='emperor')) continue;
      const ra=effR(a), rb=effR(b);
      const dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy,md=ra+rb;
      if(d2>=md*md) continue;
      // Alarmism transmission: panicked dot infects target on contact; infecter calms down. Brainwashed dots, politicians, emperors and church buildings immune.
      const isPolImmune = d => d.type==='politician' || d.faction==='politician';
      const isAlarmImmune = d => isPolImmune(d) || d.type==='emperor' || d.type==='church' || d._atWar;
      // Emperors recruit alarmists (keep their infected behaviour, change colour/faction)
      if(a.type==='emperor' && b._infected){ b.color=a.color; b.faction='emperor'; continue; }
      if(b.type==='emperor' && a._infected){ a.color=b.color; a.faction='emperor'; continue; }
      const inPostChaos = d => d._postChaosUntil && performance.now() < d._postChaosUntil;
      if(a._infected && a._panicked && !inPostChaos(a) && !inPostChaos(b) && !a._demoralized && !b._infected && !b._demoralized && !b._elite && !b._bwT && !isAlarmImmune(b) && b.type!=='tyrant'){
        b._infected = true; b._panicked = true; b._infectedFrames = 0;
        b.color = '#ffb3de'; b.faction = null; b.type = 'normal';
        b.size = Math.max(MIN_SZ, b.size - 5/b.size);
        const sp = Math.hypot(b.vx,b.vy)||0.1;
        b.vx = b.vx/sp * 4; b.vy = b.vy/sp * 4;
        a._panicked = false;
      } else if(b._infected && b._panicked && !inPostChaos(a) && !inPostChaos(b) && !b._demoralized && !a._infected && !a._demoralized && !a._elite && !a._bwT && !isAlarmImmune(a) && a.type!=='tyrant'){
        a._infected = true; a._panicked = true; a._infectedFrames = 0;
        a.color = '#ffb3de'; a.faction = null; a.type = 'normal';
        a.size = Math.max(MIN_SZ, a.size - 5/a.size);
        const sp = Math.hypot(a.vx,a.vy)||0.1;
        a.vx = a.vx/sp * 4; a.vy = a.vy/sp * 4;
        b._panicked = false;
      }
      // Cure: 2 touches by same colour convert alarmist to that colour
      // (Tyrants and emperors don't cure — they recruit via the tyrant/emperor branch in applyConversion)
      const cure = (al, healer) => {
        if(!al._cureTouches) al._cureTouches = {};
        al._cureTouches[healer.color] = (al._cureTouches[healer.color]||0) + 1;
        if(al._cureTouches[healer.color] >= 2){
          al._infected = false;
          al._panicked = false;
          al._cureTouches = null;
          al.color = healer.color;
          al.faction = (healer.color==='red'||healer.color==='blue'||healer.color==='white') ? null : healer.faction;
          al.size = Math.max(MIN_SZ, al.size - 5/al.size);
        }
      };
      const canCure = d => d.type !== 'tyrant' && d.type !== 'emperor';
      if(a._infected && !b._infected && !b._elite && b.color!=='#28231E' && canCure(b)) cure(a, b);
      if(b._infected && !a._infected && !a._elite && a.color!=='#28231E' && canCure(a)) cure(b, a);
      const d=Math.sqrt(d2); if(d<.001) continue;
      const nx=dx/d,ny=dy/d;
      const bwInvolved=a._bwT>0||b._bwT>0;
      const bothBw=a._bwT>0 && b._bwT>0;
      const churchInvolved=a.type==='church'||b.type==='church'||a.faction==='church'||b.faction==='church';
      const leaderInvolved=a.type==='church'||b.type==='church';
      if(!bwInvolved){
        if(leaderInvolved){
          // Church LEADER stays put; push the other dot out by overlap amount only
          const ch = a.type==='church' ? a : b;
          const other = ch===a ? b : a;
          // Same-colour church follower over size 12 gets absorbed into the building forever
          if(other.type==='normal' && other.faction==='church' && other.color===ch.color && other.size>12){
            other._inChurch = true;
            other.vx = 0; other.vy = 0;
            continue;
          }
          const onx = ch===a ? nx : -nx; // outward from church
          const ony = ch===a ? ny : -ny;
          const sep = (md - d) + 2;
          other.x += onx * sep;
          other.y += ony * sep;
          other.x = Math.max(other.size, Math.min(CW-other.size, other.x));
          other.y = Math.max(other.size, Math.min(CH-other.size, other.y));
          // If still overlapping church after canvas clamp → trapped against the wall, kill it
          const ndx = other.x - ch.x, ndy = other.y - ch.y;
          if(Math.hypot(ndx, ndy) < ch.size + other.size){
            other.dead = true;
            continue;
          }
          // Anti-glitch: track consecutive frames of church-contact and kill if persistent
          other._churchTouchFrames = (other._churchTouchFrames||0) + 1;
          if(other._churchTouchFrames > 12){
            other.dead = true;
            continue;
          }
          applyConversion(a,b);
          const vn = other.vx*onx + other.vy*ony;
          if(vn<0){ other.vx -= 2*vn*onx; other.vy -= 2*vn*ony; }
          const outSpeed = other.vx*onx + other.vy*ony;
          const minOut = 1.5;
          if(outSpeed<minOut){
            other.vx += (minOut-outSpeed)*onx;
            other.vy += (minOut-outSpeed)*ony;
          }
          continue;
        } else if(churchInvolved){
          // Church-involved (follower vs anything): apply priority shoving — bigger flock yields to smaller, flock yields to non-flock
          const aIsFlock = a.faction==='church';
          const bIsFlock = b.faction==='church';
          let aPriority = 1, bPriority = 1;
          if(aIsFlock) aPriority -= 0.5;
          if(bIsFlock) bPriority -= 0.5;
          if(aIsFlock && bIsFlock){
            if(a.size > b.size) aPriority -= 0.3;
            if(b.size > a.size) bPriority -= 0.3;
          }
          const totalP = aPriority + bPriority;
          const aShare = bPriority / totalP; // a moves by this share
          const bShare = aPriority / totalP;
          const sep = md - d;
          a.x -= nx*sep*aShare; a.y -= ny*sep*aShare;
          b.x += nx*sep*bShare; b.y += ny*sep*bShare;
          const ma=a.size,mb=b.size,vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
          if(vn<0){
            const imp=-(1+BOUNCE)*vn*ma*mb/(ma+mb);
            a.vx-=(imp/ma)*nx*(aShare*2); a.vy-=(imp/ma)*ny*(aShare*2);
            b.vx+=(imp/mb)*nx*(bShare*2); b.vy+=(imp/mb)*ny*(bShare*2);
          }
          applyConversion(a,b);
          continue;
        } else {
          const sep=(md-d)*.5;
          const aStatic = (a.type==='emperor' || (a.type==='tyrant' && a.crowned) || a.type==='media');
          const bStatic = (b.type==='emperor' || (b.type==='tyrant' && b.crowned) || b.type==='media');
          // Rev leader passes through other dots (impulse only on target)
          if(a.type==='revolutionary'){
            b.x+=nx*sep*2; b.y+=ny*sep*2;
          }
          else if(b.type==='revolutionary'){
            a.x-=nx*sep*2; a.y-=ny*sep*2;
          }
          else if(aStatic && !bStatic){
            b.x+=nx*sep*2; b.y+=ny*sep*2;
          }
          else if(bStatic && !aStatic){
            a.x-=nx*sep*2; a.y-=ny*sep*2;
          }
          else { a.x-=nx*sep; a.y-=ny*sep; b.x+=nx*sep; b.y+=ny*sep; }
        }
      } else if(bothBw){
        // Full separation + minimum repulsion so captured dots never stack
        const sep=(md-d)*.6 + 1;
        a.x-=nx*sep; a.y-=ny*sep; b.x+=nx*sep; b.y+=ny*sep;
        const ma=a.size,mb=b.size,vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(vn<0){
          const imp=-(1+BOUNCE)*vn*ma*mb/(ma+mb);
          a.vx-=(imp/ma)*nx; a.vy-=(imp/ma)*ny;
          b.vx+=(imp/mb)*nx; b.vy+=(imp/mb)*ny;
        }
        // Inject a tiny outward kick so near-stopped dots still drift apart
        const kick=0.4;
        a.vx -= nx*kick; a.vy -= ny*kick;
        b.vx += nx*kick; b.vy += ny*kick;
        continue;
      }
      const ma=a.size,mb=b.size,vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
      if(vn<0){
        if(!churchInvolved && !bwInvolved){
          const imp=-(1+BOUNCE)*vn*ma*mb/(ma+mb);
          if(!a.crowned && a.type!=='revolutionary'){ a.vx-=(imp/ma)*nx; a.vy-=(imp/ma)*ny; }
          if(!b.crowned && b.type!=='revolutionary'){ b.vx+=(imp/mb)*nx; b.vy+=(imp/mb)*ny; }
        }
        applyConversion(a,b);
      }
    }
  }
}

function isEliteInRing(d){
  if(!d._elite||!d._eliteId) return false;
  const ring = elites.find(e => e.id === d._eliteId);
  if(!ring) return false;
  const dx = d.x-ring.x, dy = d.y-ring.y;
  return dx*dx + dy*dy < ring.r*ring.r;
}
function applyConversion(a,b){
  // Media buildings don't participate in conversion (handled by captivation logic)
  if(a.type==='media' || b.type==='media') return;
  // Elite dots are immune only while inside their ring
  if(isEliteInRing(a)||isEliteInRing(b)) return;
  // Soldiers are inert: no conversion either way while at war
  if(a._atWar || b._atWar) return;
  // Post-chaos deceleration: dots are inert until they settle (~2.5s after chaos ended)
  const _pcNow = performance.now();
  if((a._postChaosUntil && _pcNow < a._postChaosUntil) || (b._postChaosUntil && _pcNow < b._postChaosUntil)) return;
  // Demoralised dots cannot be converted by ANY contact-based mechanism EXCEPT by politicians or tyrants
  if(a._demoralized || b._demoralized){
    const other = a._demoralized ? b : a;
    const isPolOrTyrant = other.type === 'politician' || other.type === 'tyrant';
    if(!isPolOrTyrant) return;
  }
  // ── Thugs: kill smaller non-same-colour dots; ignore same-colour, bigger, church, soldiers, leaders, demoralised
  const handleThug = (thug, other) => {
    if(other.dead) return false;
    if(thug.color === 'white') return false; // white-dominant thugs are inert
    if(other.color === thug.color) return false;
